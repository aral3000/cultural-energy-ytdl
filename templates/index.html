<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Media Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v=2) }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sunlight from the surface -->
    <div class="sunlight-rays"></div>
    <!-- Animated Morphing Ocean Waves -->
    <svg class="ocean" viewBox="0 0 1000 100" preserveAspectRatio="none">
        <!-- Back Wave -->
        <path fill="rgba(116, 209, 214, 0.3)" d="M0,100 C150,100 350,0 500,0 C650,0 850,100 1000,100 L1000,0 L0,0 Z">
            <animate attributeName="d" dur="8s" repeatCount="indefinite" values="
                M0,100 C150,100 350,0 500,0 C650,0 850,100 1000,100 L1000,0 L0,0 Z;
                M0,100 C150,0 350,100 500,100 C650,100 850,0 1000,0 L1000,0 L0,0 Z;
                M0,100 C150,100 350,0 500,0 C650,0 850,100 1000,100 L1000,0 L0,0 Z
            " />
        </path>
        <!-- Front Wave -->
        <path fill="rgba(90, 245, 206, 0.4)" d="M0,100 C250,0 400,100 600,100 C800,100 900,0 1000,0 L1000,0 L0,0 Z">
            <animate attributeName="d" dur="12s" repeatCount="indefinite" values="
                M0,100 C250,0 400,100 600,100 C800,100 900,0 1000,0 L1000,0 L0,0 Z;
                M0,100 C250,100 400,0 600,0 C800,0 900,100 1000,100 L1000,0 L0,0 Z;
                M0,100 C250,0 400,100 600,100 C800,100 900,0 1000,0 L1000,0 L0,0 Z
            " />
        </path>
    </svg>
    <!-- Deep Sea Currents Layer -->
    <div class="current-layer" id="currentLayer"></div>
    <!-- Fish Layer -->
    <div class="fish-layer" id="fishLayer"></div>
    
    <div class="container">
        <header>
            <div class="header-top" style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div style="flex: 1; text-align: center;">
                    <h1>Pro Media Downloader</h1>
                    <p class="subtitle">High-Performance Media Downloader</p>
                </div>
                <button id="shutdownBtn" class="shutdown-btn" title="Turn off local server and exit app">🔴 SHUT DOWN</button>
            </div>
        </header>

        <main>
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="ENTER_YOUTUBE_URL_HERE" autofocus>
                <button id="analyzeBtn">ANALYZE</button>
            </div>

            <div id="loader" class="hidden">
                <div class="spinner"></div>
                <p>Decrypting data...</p>
            </div>

            <div id="result" class="hidden">
                <div class="video-card">
                    <img id="thumbnail" src="" alt="Video Thumbnail">
                    <div class="video-info">
                        <h2 id="videoTitle">Video Title</h2>
                        <p id="videoDuration">Duration: 00:00</p>
                    </div>
                </div>

                <div class="download-section">
                    <label for="formatSelect">Select Format:</label>
                    <select id="formatSelect">
                        <!-- Options will be populated here -->
                    </select>
                    <button id="downloadBtn">DOWNLOAD_FILE</button>
                    
                    <div id="progressContainer" class="hidden">
                        <div class="progress-bar-bg">
                            <div id="progressBar" class="progress-bar-fill"></div>
                        </div>
                        <div id="progressText" class="progress-text">Initializing download...</div>
                        <button id="cancelBtn" class="cancel-btn">CANCEL DOWNLOAD</button>
                    </div>
                </div>
            </div>
            
            <div id="errorBox" class="hidden"></div>

            <div id="historySection">
                <div class="history-header">
                    <h3>DOWNLOAD_HISTORY</h3>
                    <button id="refreshHistoryBtn">REFRESH</button>
                </div>
                <div id="historyList">
                    <!-- History items will be populated here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Sea Decorations -->
    <div class="sea-decorations" id="seaDecorations">
        <div class="sea-plants">
            <span class="plant" style="animation-delay: 0s;">🌿</span>
            <span class="plant" style="animation-delay: 1.5s;">🪸</span>
            <span class="plant" style="animation-delay: 0.5s;">🦑</span>
            <span class="plant" style="animation-delay: 2s;">🐠</span>
            <span class="plant" style="animation-delay: 1s;">🪸</span>
            <span class="plant" style="animation-delay: 0.8s;">🌿</span>
        </div>
    </div>

    <script>
        // Generate random bubbles
        const seaDecorations = document.getElementById('seaDecorations');
        for (let i = 0; i < 35; i++) {
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            const size = Math.random() * 15 + 5;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${Math.random() * 100}%`;
            bubble.style.animationDuration = `${Math.random() * 6 + 4}s`;
            bubble.style.animationDelay = `${Math.random() * 5}s`;
            seaDecorations.appendChild(bubble);
        }

        // Generate deep sea current particles (SNAKE STYLE!)
        const currentLayer = document.getElementById('currentLayer');
        for (let i = 0; i < 25; i++) {
            const wrapper = document.createElement('div');
            wrapper.style.position = 'absolute';
            wrapper.style.top = `${Math.random() * 100}%`;
            wrapper.style.width = '100%';
            
            // Horizontal sweep animation on the wrapper
            const sweepDur = 15 + Math.random() * 10;
            wrapper.style.animation = `sweep ${sweepDur}s linear ${-(Math.random() * 20)}s infinite`;
            
            const particle = document.createElement('div');
            particle.classList.add('current-particle');
            
            // Random width between 80px and 200px
            const width = Math.random() * 120 + 80;
            particle.style.width = `${width}px`;
            
            // Vertical snake bobbing animation on the particle itself
            const bobDur = 2 + Math.random() * 3;
            particle.style.animation = `snake-bob ${bobDur}s ease-in-out ${-(Math.random() * 5)}s infinite alternate`;
            
            wrapper.appendChild(particle);
            currentLayer.appendChild(wrapper);
        }

        // Generate Bionic Animated Fishes
        const fishLayer = document.getElementById('fishLayer');
        const numFishes = 12; // spawn 12 fishes immediately
        for (let i = 0; i < numFishes; i++) {
            const container = document.createElement('div');
            container.classList.add('fish-container');
            
            // Random properties
            const isLeftToRight = Math.random() > 0.5;
            const topPos = 10 + Math.random() * 80; 
            const duration = 10 + Math.random() * 15; // faster! 10-25s
            // NEGATIVE delay means they start already swimming in the middle of the screen!
            const delay = -(Math.random() * 30); 
            const bobDuration = 2 + Math.random() * 3; 
            const sizeScale = 0.5 + Math.random() * 0.8;
            
            container.style.top = `${topPos}%`;
            container.style.animation = `${isLeftToRight ? 'swim-lr' : 'swim-rl'} ${duration}s linear ${delay}s infinite`;
            
            const bob = document.createElement('div');
            bob.classList.add('fish-bob');
            bob.style.animationDuration = `${bobDuration}s`;
            
            // Create a wrapper just for scaling so it doesn't get overridden by animations
            const scaler = document.createElement('div');
            scaler.style.transform = `scale(${sizeScale})`;
            
            // SVG Fish with XMLNS added!
            scaler.innerHTML = `
                <svg class="fish-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 50">
                    <path class="fish-tail" d="M20,25 L0,10 L0,40 Z"/>
                    <path class="fish-body" d="M20,25 C20,10 60,5 80,25 C60,45 20,40 20,25 Z"/>
                    <circle class="fish-eye" cx="65" cy="20" r="3"/>
                </svg>
            `;
            
            bob.appendChild(scaler);
            container.appendChild(bob);
            fishLayer.appendChild(container);
        }
    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
